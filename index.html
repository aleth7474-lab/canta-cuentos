<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Canta Cuentos 🌟</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --rojo:       #FF5A5F;
      --rojo-suave: #FF8A8D;
      --amarillo:   #FFD166;
      --naranja:    #F4A261;
      --verde:      #6BCB77;
      --azul:       #4D96FF;
      --crema:      #FFF8EE;
      --cafe:       #6B4226;
      --texto:      #3A2010;
      --fondo:      #FFF4E4;
      --tarjeta:    #FFFFFF;
      --sombra:     rgba(90,40,0,0.12);
      --radio:      24px;
      --transicion: 0.4s cubic-bezier(.4,0,.2,1);
    }
    [data-tema="noche"] {
      --fondo:   #1A1025;
      --tarjeta: #2A1F38;
      --texto:   #F5E6FF;
      --crema:   #2A1F38;
      --sombra:  rgba(0,0,0,0.4);
      --cafe:    #D4A8FF;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--fondo);
      color: var(--texto);
      min-height: 100vh;
      transition: background var(--transicion), color var(--transicion);
      overflow-x: hidden;
    }

    /* ── FONDO ── */
    .fondo-decorativo { position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden; }
    .burbuja { position:absolute;border-radius:50%;opacity:.18;animation:flotar 8s ease-in-out infinite; }
    .burbuja:nth-child(1){width:120px;height:120px;background:var(--rojo);top:5%;left:3%;animation-duration:9s;}
    .burbuja:nth-child(2){width:80px;height:80px;background:var(--amarillo);top:20%;right:5%;animation-delay:2s;animation-duration:7s;}
    .burbuja:nth-child(3){width:160px;height:160px;background:var(--azul);bottom:10%;left:8%;animation-delay:1s;animation-duration:11s;}
    .burbuja:nth-child(4){width:60px;height:60px;background:var(--verde);bottom:20%;right:10%;animation-delay:3s;}
    .burbuja:nth-child(5){width:100px;height:100px;background:var(--naranja);top:50%;left:50%;animation-delay:1.5s;animation-duration:10s;}
    @keyframes flotar { 0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-30px) scale(1.05);} }

    /* ── CONTENEDOR ── */
    .contenedor { position:relative;z-index:1;max-width:900px;margin:0 auto;padding:0 16px 40px; }

    /* ── HEADER ── */
    header { display:flex;align-items:center;justify-content:space-between;padding:20px 0 10px;gap:12px; }
    .logo-titulo { display:flex;align-items:center;gap:10px; }
    .logo-titulo h1 { font-family:'Baloo 2',cursive;font-size:clamp(1.6rem,5vw,2.4rem);font-weight:800;color:var(--rojo);line-height:1; }
    .logo-titulo h1 span { color:var(--amarillo); }
    .mascota-header { width:60px;height:60px;flex-shrink:0;animation:cabecear 3s ease-in-out infinite; }
    @keyframes cabecear { 0%,100%{transform:rotate(-5deg);}50%{transform:rotate(5deg);} }
    .header-acciones { display:flex;gap:10px;align-items:center; }
    #btn-tema { background:var(--amarillo);border:none;border-radius:50px;padding:10px 18px;font-size:1.3rem;cursor:pointer;box-shadow:0 4px 12px var(--sombra);transition:transform .2s,background var(--transicion); }
    #btn-tema:hover { transform:scale(1.12); }

    /* ── BOTÓN CERRAR SESIÓN ── */
    #btn-logout {
      background: var(--rojo);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 10px 18px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      box-shadow: 0 4px 12px var(--sombra);
      transition: transform .2s;
      display: none;
    }
    #btn-logout:hover { transform: scale(1.06); }

    .subtitulo { text-align:center;font-size:clamp(.95rem,2.5vw,1.15rem);color:var(--cafe);margin:4px 0 28px;font-weight:600;opacity:.85; }

    /* ── PANTALLAS ── */
    .pantalla { display:none; }
    .pantalla.activa { display:block;animation:aparecer .5s ease; }
    @keyframes aparecer { from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);} }

    /* ── PANTALLA AUTH ── */
    .auth-card {
      background: var(--tarjeta);
      border-radius: var(--radio);
      padding: 40px 32px;
      box-shadow: 0 8px 32px var(--sombra);
      max-width: 420px;
      margin: 20px auto;
      text-align: center;
    }
    .auth-card h2 { font-family:'Baloo 2',cursive;font-size:1.8rem;color:var(--rojo);margin-bottom:6px; }
    .auth-card p  { color:var(--cafe);margin-bottom:24px;font-size:.95rem; }

    .auth-tabs { display:flex;gap:8px;margin-bottom:24px;background:var(--fondo);border-radius:50px;padding:4px; }
    .auth-tab {
      flex:1;padding:10px;border:none;border-radius:50px;cursor:pointer;
      font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:700;
      background:transparent;color:var(--cafe);transition:background .2s,color .2s;
    }
    .auth-tab.activo { background:var(--rojo);color:#fff; }

    .campo-grupo { margin-bottom:16px;text-align:left; }
    .campo-grupo label { display:block;font-weight:700;margin-bottom:6px;color:var(--cafe);font-size:.9rem; }
    .campo-grupo input {
      width:100%;padding:14px 18px;border:2px solid #e0d0c0;border-radius:14px;
      font-size:1rem;font-family:'Nunito',sans-serif;background:var(--fondo);color:var(--texto);
      transition:border .2s;outline:none;
    }
    .campo-grupo input:focus { border-color:var(--rojo); }

    .btn-auth {
      width:100%;padding:16px;border:none;border-radius:50px;
      background:var(--rojo);color:#fff;font-size:1.1rem;font-weight:800;
      font-family:'Nunito',sans-serif;cursor:pointer;
      box-shadow:0 4px 16px rgba(255,90,95,.35);
      transition:transform .2s,background .2s;
      margin-top:8px;
    }
    .btn-auth:hover { transform:scale(1.03);background:var(--rojo-suave); }
    .btn-auth:disabled { opacity:.5;cursor:default;transform:none; }

    .auth-error {
      background:#FFE8E8;border:1.5px solid var(--rojo);color:#B00;
      border-radius:12px;padding:10px 14px;margin-top:12px;font-size:.9rem;display:none;
    }

    /* ── PANEL USUARIO ── */
    .panel-usuario {
      background: var(--tarjeta);
      border-radius: var(--radio);
      padding: 20px 24px;
      box-shadow: 0 4px 16px var(--sombra);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .avatar-usuario {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--rojo), var(--naranja));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; flex-shrink: 0;
    }
    .info-usuario { flex: 1; min-width: 120px; }
    .info-usuario h3 { font-family:'Baloo 2',cursive;font-size:1.1rem;color:var(--texto);margin-bottom:2px; }
    .info-usuario p  { font-size:.85rem;color:var(--cafe);opacity:.85; }

    .racha-badge {
      background: linear-gradient(135deg, var(--amarillo), var(--naranja));
      border-radius: 50px;
      padding: 10px 18px;
      text-align: center;
      box-shadow: 0 4px 12px rgba(244,162,97,.3);
    }
    .racha-badge .numero { font-family:'Baloo 2',cursive;font-size:1.8rem;font-weight:800;color:var(--cafe);line-height:1; }
    .racha-badge .label  { font-size:.75rem;font-weight:700;color:var(--cafe);opacity:.8; }

    .libros-badge {
      background: linear-gradient(135deg, var(--azul), #7B61FF);
      border-radius: 50px;
      padding: 10px 18px;
      text-align: center;
      box-shadow: 0 4px 12px rgba(77,150,255,.3);
    }
    .libros-badge .numero { font-family:'Baloo 2',cursive;font-size:1.8rem;font-weight:800;color:#fff;line-height:1; }
    .libros-badge .label  { font-size:.75rem;font-weight:700;color:#fff;opacity:.85; }

    /* ── GRID CUENTOS ── */
    .titulo-seccion { font-family:'Baloo 2',cursive;font-size:1.5rem;font-weight:800;color:var(--rojo);margin-bottom:18px;text-align:center; }
    .grid-cuentos { display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px; }
    .tarjeta-cuento {
      background:var(--tarjeta);border-radius:var(--radio);padding:24px 20px;cursor:pointer;
      box-shadow:0 6px 24px var(--sombra);transition:transform var(--transicion),box-shadow var(--transicion);
      display:flex;flex-direction:column;align-items:center;gap:12px;
      border:3px solid transparent;position:relative;overflow:hidden;
    }
    .tarjeta-cuento::before { content:'';position:absolute;top:0;left:0;right:0;height:6px;border-radius:var(--radio) var(--radio) 0 0; }
    .tarjeta-cuento:nth-child(1)::before{background:var(--rojo);}
    .tarjeta-cuento:nth-child(2)::before{background:var(--azul);}
    .tarjeta-cuento:nth-child(3)::before{background:var(--verde);}
    .tarjeta-cuento:nth-child(4)::before{background:var(--naranja);}
    .tarjeta-cuento:hover { transform:translateY(-8px) scale(1.02);box-shadow:0 16px 40px var(--sombra); }
    .ilustracion-tarjeta { width:100px;height:100px; }
    .tarjeta-cuento h3 { font-family:'Baloo 2',cursive;font-size:1.15rem;font-weight:800;color:var(--texto);text-align:center; }
    .tarjeta-cuento p  { font-size:.88rem;color:var(--cafe);text-align:center;line-height:1.4;opacity:.85; }
    .badge-edad { background:var(--amarillo);color:var(--cafe);font-size:.78rem;font-weight:700;border-radius:20px;padding:3px 12px; }
    .badge-leido { background:var(--verde);color:#fff;font-size:.75rem;font-weight:700;border-radius:20px;padding:3px 10px;position:absolute;top:14px;right:14px; }

    /* ── PANTALLA CUENTO ── */
    #btn-volver { display:flex;align-items:center;gap:8px;background:var(--rojo);color:#fff;border:none;border-radius:50px;padding:12px 24px;font-size:1rem;font-weight:700;cursor:pointer;box-shadow:0 4px 14px var(--sombra);transition:transform .2s,background .2s;margin-bottom:20px;font-family:'Nunito',sans-serif; }
    #btn-volver:hover { transform:scale(1.06);background:var(--rojo-suave); }
    .cuento-header { background:var(--tarjeta);border-radius:var(--radio);padding:28px 24px 20px;box-shadow:0 6px 24px var(--sombra);margin-bottom:20px;display:flex;flex-direction:column;align-items:center;gap:12px; }
    .cuento-header h2 { font-family:'Baloo 2',cursive;font-size:clamp(1.4rem,4vw,2rem);font-weight:800;color:var(--rojo);text-align:center; }
    .ilustracion-cuento { width:130px;height:130px; }
    .controles-voz { display:flex;gap:12px;flex-wrap:wrap;justify-content:center;background:var(--tarjeta);border-radius:var(--radio);padding:18px 20px;box-shadow:0 4px 16px var(--sombra);margin-bottom:20px; }
    .btn-voz { display:flex;align-items:center;gap:8px;border:none;border-radius:50px;padding:14px 22px;font-size:1rem;font-weight:700;cursor:pointer;transition:transform .2s,opacity .2s;box-shadow:0 4px 12px var(--sombra);font-family:'Nunito',sans-serif; }
    .btn-voz:hover { transform:scale(1.08); }
    .btn-voz:disabled { opacity:.45;cursor:default;transform:none; }
    #btn-play  { background:var(--verde);color:#fff; }
    #btn-pausa { background:var(--amarillo);color:var(--cafe); }
    #btn-stop  { background:var(--rojo);color:#fff; }
    .progreso-voz { width:100%;height:8px;background:var(--fondo);border-radius:10px;overflow:hidden;margin-top:8px; }
    .progreso-voz-barra { height:100%;width:0%;background:linear-gradient(90deg,var(--rojo),var(--amarillo));border-radius:10px;transition:width .3s linear; }
    .cuerpo-cuento { background:var(--tarjeta);border-radius:var(--radio);padding:28px 28px 32px;box-shadow:0 6px 24px var(--sombra);font-size:clamp(1.05rem,2.5vw,1.2rem);line-height:1.85;color:var(--texto); }
    .cuerpo-cuento p { margin-bottom:16px; }
    .cuerpo-cuento p:last-child { margin-bottom:0; }
    .parrafo-activo { background:rgba(255,209,102,.25);border-radius:10px;padding:4px 8px;transition:background .3s; }

    /* ── ANIMACIONES PERSONAJES ── */
    @keyframes respirar  { 0%,100%{transform:scale(1);}50%{transform:scale(1.06);} }
    @keyframes ojos-parpadear { 0%,90%,100%{transform:scaleY(1);}95%{transform:scaleY(.1);} }
    @keyframes oreja-mover { 0%,100%{transform:rotate(0deg);}50%{transform:rotate(8deg);} }
    @keyframes conejo-saltar { 0%,100%{transform:translateY(0);}40%{transform:translateY(-8px);} }
    @keyframes oreja-conejo  { 0%,100%{transform:rotate(-5deg);}50%{transform:rotate(5deg);} }
    @keyframes estrella-girar { from{transform:rotate(0deg) scale(1);}50%{transform:rotate(180deg) scale(1.1);}to{transform:rotate(360deg) scale(1);} }
    @keyframes brillo-estrella { 0%,100%{opacity:1;}50%{opacity:.6;} }
    @keyframes pollito-picar { 0%,100%{transform:rotate(0deg);}30%,70%{transform:rotate(15deg);}50%{transform:rotate(0deg);} }
    @keyframes ala-pollito { 0%,100%{transform:rotate(0deg);}50%{transform:rotate(-20deg);} }
    .cuerpo-oso  { animation:respirar 3s ease-in-out infinite;transform-origin:center; }
    .ojo-oso     { animation:ojos-parpadear 4s ease-in-out infinite;transform-origin:center; }
    .oreja-oso   { animation:oreja-mover 4s ease-in-out infinite;transform-origin:bottom center; }
    .cuerpo-conejo { animation:conejo-saltar 2s ease-in-out infinite;transform-origin:bottom center; }
    .oreja-conejo  { animation:oreja-conejo 1.5s ease-in-out infinite;transform-origin:bottom center; }
    .estrellita { animation:estrella-girar 6s linear infinite,brillo-estrella 2s ease-in-out infinite;transform-origin:center; }
    .cabeza-pollito { animation:pollito-picar 2s ease-in-out infinite;transform-origin:bottom center; }
    .ala-pollito    { animation:ala-pollito 1s ease-in-out infinite;transform-origin:right center; }

    /* ── LOADER ── */
    #loader {
      position:fixed;inset:0;background:var(--fondo);z-index:999;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
    }
    .loader-oso { animation:respirar 1s ease-in-out infinite; }
    #loader p { font-family:'Baloo 2',cursive;font-size:1.2rem;color:var(--rojo); }

    footer { text-align:center;padding:20px;font-size:.85rem;color:var(--cafe);opacity:.7; }

    @media(max-width:500px){
      .auth-card{padding:28px 16px;}
      .cuento-header,.cuerpo-cuento{padding:20px 16px;}
      .controles-voz{gap:8px;}
      .btn-voz{padding:12px 16px;font-size:.92rem;}
      .panel-usuario{gap:10px;}
    }
  </style>
</head>
<body>

<!-- FONDO -->
<div class="fondo-decorativo" aria-hidden="true">
  <div class="burbuja"></div><div class="burbuja"></div><div class="burbuja"></div>
  <div class="burbuja"></div><div class="burbuja"></div>
</div>

<!-- LOADER -->
<div id="loader">
  <svg class="loader-oso" width="90" height="90" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <g class="cuerpo-oso">
      <circle cx="24" cy="28" r="16" fill="#F4A261"/><circle cx="24" cy="28" r="10" fill="#FDDCB5"/>
      <circle cx="76" cy="28" r="16" fill="#F4A261"/><circle cx="76" cy="28" r="10" fill="#FDDCB5"/>
      <ellipse cx="50" cy="72" rx="28" ry="22" fill="#F4A261"/>
      <circle cx="50" cy="44" r="28" fill="#F4A261"/>
      <ellipse cx="50" cy="53" rx="14" ry="10" fill="#FDDCB5"/>
      <ellipse cx="50" cy="47" rx="6" ry="4" fill="#8B5E3C"/>
      <circle cx="38" cy="38" r="5" fill="#3A2010"/><circle cx="62" cy="38" r="5" fill="#3A2010"/>
      <path d="M42 56 Q50 63 58 56" stroke="#6B4226" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    </g>
  </svg>
  <p>Cargando CantaCuentos... 🌟</p>
</div>

<!-- CONTENIDO -->
<div class="contenedor">

  <!-- HEADER -->
  <header>
    <div class="logo-titulo">
      <svg class="mascota-header" width="60" height="60" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <g class="cuerpo-oso">
          <circle class="oreja-oso" cx="24" cy="28" r="16" fill="#F4A261"/><circle cx="24" cy="28" r="10" fill="#FDDCB5"/>
          <circle class="oreja-oso" cx="76" cy="28" r="16" fill="#F4A261" style="animation-delay:.6s"/><circle cx="76" cy="28" r="10" fill="#FDDCB5"/>
          <ellipse cx="50" cy="72" rx="28" ry="22" fill="#F4A261"/>
          <circle cx="50" cy="44" r="28" fill="#F4A261"/>
          <ellipse cx="50" cy="53" rx="14" ry="10" fill="#FDDCB5"/>
          <ellipse cx="50" cy="47" rx="6" ry="4" fill="#8B5E3C"/>
          <circle class="ojo-oso" cx="38" cy="38" r="5" fill="#3A2010"/>
          <circle class="ojo-oso" cx="62" cy="38" r="5" fill="#3A2010" style="animation-delay:.3s"/>
          <path d="M42 56 Q50 63 58 56" stroke="#6B4226" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <ellipse cx="50" cy="78" rx="16" ry="10" fill="#FDDCB5"/>
        </g>
      </svg>
      <h1>Canta<span>Cuentos</span> 🌟</h1>
    </div>
    <div class="header-acciones">
      <button id="btn-logout" aria-label="Cerrar sesión">Salir 👋</button>
      <button id="btn-tema" aria-label="Cambiar modo día/noche">🌙</button>
    </div>
  </header>

  <p class="subtitulo">✨ Un mundo mágico de historias para ti ✨</p>

  <!-- ══════════ PANTALLA: LOGIN/REGISTRO ══════════ -->
  <div id="pantalla-auth" class="pantalla activa">
    <div class="auth-card">
      <div style="font-size:3rem;margin-bottom:8px;">🐻</div>
      <h2>¡Bienvenido!</h2>
      <p>Inicia sesión para guardar tu racha de lectura</p>

      <div class="auth-tabs">
        <button class="auth-tab activo" id="tab-login"   onclick="mostrarTab('login')">Entrar</button>
        <button class="auth-tab"        id="tab-registro" onclick="mostrarTab('registro')">Registrarse</button>
      </div>

      <!-- LOGIN -->
      <div id="form-login">
        <div class="campo-grupo">
          <label>📧 Correo electrónico</label>
          <input type="email" id="login-email" placeholder="tucorreo@gmail.com" autocomplete="email"/>
        </div>
        <div class="campo-grupo">
          <label>🔒 Contraseña</label>
          <input type="password" id="login-pass" placeholder="Tu contraseña" autocomplete="current-password"/>
        </div>
        <button class="btn-auth" id="btn-login-submit" onclick="iniciarSesion()">✨ Entrar</button>
      </div>

      <!-- REGISTRO -->
      <div id="form-registro" style="display:none">
        <div class="campo-grupo">
          <label>👤 Nombre</label>
          <input type="text" id="reg-nombre" placeholder="¿Cómo te llamas?"/>
        </div>
        <div class="campo-grupo">
          <label>📧 Correo electrónico</label>
          <input type="email" id="reg-email" placeholder="tucorreo@gmail.com" autocomplete="email"/>
        </div>
        <div class="campo-grupo">
          <label>🔒 Contraseña</label>
          <input type="password" id="reg-pass" placeholder="Mínimo 6 caracteres" autocomplete="new-password"/>
        </div>
        <button class="btn-auth" id="btn-reg-submit" onclick="registrarse()">🌟 Crear cuenta</button>
      </div>

      <div class="auth-error" id="auth-error"></div>
    </div>
  </div>

  <!-- ══════════ PANTALLA: LISTA DE CUENTOS ══════════ -->
  <div id="pantalla-lista" class="pantalla">

    <!-- Panel del usuario -->
    <div class="panel-usuario" id="panel-usuario">
      <div class="avatar-usuario">🐻</div>
      <div class="info-usuario">
        <h3 id="nombre-usuario">Cargando...</h3>
        <p id="email-usuario"></p>
      </div>
      <div class="racha-badge">
        <div class="numero" id="racha-numero">0</div>
        <div class="label">🔥 días seguidos</div>
      </div>
      <div class="libros-badge">
        <div class="numero" id="libros-numero">0</div>
        <div class="label">📚 cuentos leídos</div>
      </div>
    </div>

    <h2 class="titulo-seccion">📚 Elige tu cuento favorito</h2>
    <div class="grid-cuentos" id="grid-cuentos"></div>
  </div>

  <!-- ══════════ PANTALLA: CUENTO ABIERTO ══════════ -->
  <div id="pantalla-cuento" class="pantalla">
    <button id="btn-volver">← Volver</button>
    <div class="cuento-header">
      <div id="ilustracion-cuento-grande" class="ilustracion-cuento"></div>
      <h2 id="titulo-cuento-abierto"></h2>
    </div>
    <div class="controles-voz">
      <button id="btn-play"  class="btn-voz">▶ Escuchar</button>

  /* ══════════════════════════════════════

  let usuarioActual = null;
  let datosUsuario  = null;
  let cuentoActivo  = null;
  let leyendo = false, pausado = false;
  let utterance = null;

  /* ══════════════════════════════════════
     FIREBASE AUTH: observar estado
  ══════════════════════════════════════ */
  onAuthStateChanged(auth, async (user) => {
    document.getElementById('loader').style.display = 'none';
    if (user) {
      usuarioActual = user;
      await cargarOCrearPerfil(user);
      mostrarPantalla('lista');
      document.getElementById('btn-logout').style.display = 'block';
    } else {
      usuarioActual = null;
      datosUsuario  = null;
      mostrarPantalla('auth');
      document.getElementById('btn-logout').style.display = 'none';
    }
  });

  /* ══════════════════════════════════════
     FIRESTORE: perfil de usuario
  ══════════════════════════════════════ */
  async function cargarOCrearPerfil(user) {
    const ref  = doc(db, 'usuarios', user.uid);
    const snap = await getDoc(ref);
    const hoy  = fechaHoy();

    if (!snap.exists()) {
      // Nuevo usuario
      const perfil = {
        nombre:       user.displayName || user.email.split('@')[0],
        email:        user.email,
        racha:        1,
        ultimoAcceso: hoy,
        diasAcceso:   [hoy],
        cuentosLeidos:[]
      };
      await setDoc(ref, perfil);
      datosUsuario = perfil;
    } else {
      datosUsuario = snap.data();
      // Actualizar racha
      const ayer = fechaAyer();
      if (datosUsuario.ultimoAcceso !== hoy) {
        let nuevaRacha = datosUsuario.ultimoAcceso === ayer
          ? (datosUsuario.racha || 0) + 1
          : 1;
        await updateDoc(ref, {
          racha:        nuevaRacha,
          ultimoAcceso: hoy,
          diasAcceso:   arrayUnion(hoy)
        });
        datosUsuario.racha        = nuevaRacha;
        datosUsuario.ultimoAcceso = hoy;
      }
    }
    actualizarPanelUsuario();
    construirGrid();
  }

  function fechaHoy() {
    return new Date().toISOString().split('T')[0];
  }
  function fechaAyer() {
    const d = new Date(); d.setDate(d.getDate()-1);
    return d.toISOString().split('T')[0];
  }

  async function marcarCuentoLeido(cuentoId) {
    if (!usuarioActual || !datosUsuario) return;
    const leidos = datosUsuario.cuentosLeidos || [];
    if (leidos.includes(cuentoId)) return;
    const ref = doc(db, 'usuarios', usuarioActual.uid);
    await updateDoc(ref, { cuentosLeidos: arrayUnion(cuentoId) });
    datosUsuario.cuentosLeidos = [...leidos, cuentoId];
    actualizarPanelUsuario();
    construirGrid();
  }

  /* ══════════════════════════════════════
     UI: PANEL USUARIO
  ══════════════════════════════════════ */
  function actualizarPanelUsuario() {
    if (!datosUsuario) return;
    document.getElementById('nombre-usuario').textContent = datosUsuario.nombre || 'Lector';
    document.getElementById('email-usuario').textContent  = datosUsuario.email  || '';
    document.getElementById('racha-numero').textContent   = datosUsuario.racha  || 0;
    document.getElementById('libros-numero').textContent  = (datosUsuario.cuentosLeidos || []).length;
  }

  /* ══════════════════════════════════════
     UI: GRID DE CUENTOS
  ══════════════════════════════════════ */
  function construirGrid() {
    const grid   = document.getElementById('grid-cuentos');
    const leidos = (datosUsuario && datosUsuario.cuentosLeidos) ? datosUsuario.cuentosLeidos : [];
    grid.innerHTML = '';
    CUENTOS.forEach(c => {
      const yaLeido = leidos.includes(c.id);
      const div = document.createElement('div');
      div.className = 'tarjeta-cuento';
      div.setAttribute('role','button');
      div.setAttribute('tabindex','0');
      div.setAttribute('aria-label',`Abrir cuento: ${c.titulo}`);
      div.innerHTML = `
        ${yaLeido ? '<span class="badge-leido">✅ Leído</span>' : ''}
        <div class="ilustracion-tarjeta">${obtenerSVG(c.personaje,100)}</div>
        <h3>${c.titulo}</h3>
        <p>${c.descripcion}</p>
        <span class="badge-edad">👶 ${c.edad}</span>
      `;
      div.addEventListener('click',  () => abrirCuento(c));
      div.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' ') abrirCuento(c); });
      grid.appendChild(div);
    });
  }

  /* ══════════════════════════════════════
     NAVEGACIÓN PANTALLAS
  ══════════════════════════════════════ */
  function mostrarPantalla(nombre) {
    document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
    document.getElementById('pantalla-'+nombre).classList.add('activa');
  }

  function abrirCuento(cuento) {
    cuentoActivo = cuento;
    document.getElementById('titulo-cuento-abierto').textContent = cuento.titulo;
    document.getElementById('ilustracion-cuento-grande').innerHTML = obtenerSVG(cuento.personaje,130);
    document.getElementById('texto-cuento').innerHTML = cuento.texto.map((p,i)=>`<p id="parrafo-${i}">${p}</p>`).join('');
    detenerVoz();
    mostrarPantalla('cuento');
    window.scrollTo({top:0,behavior:'smooth'});
    // Marcar como leído cuando abre el cuento
    marcarCuentoLeido(cuento.id);
  }

  document.getElementById('btn-volver').addEventListener('click', () => {
    detenerVoz();
    mostrarPantalla('lista');
    window.scrollTo({top:0,behavior:'smooth'});
  });

  /* ══════════════════════════════════════
     AUTH: LOGIN / REGISTRO / LOGOUT
  ══════════════════════════════════════ */
  window.mostrarTab = (tab) => {
    document.getElementById('form-login').style.display    = tab==='login'    ? 'block' : 'none';
    document.getElementById('form-registro').style.display = tab==='registro' ? 'block' : 'none';
    document.getElementById('tab-login').classList.toggle('activo',    tab==='login');
    document.getElementById('tab-registro').classList.toggle('activo', tab==='registro');
    ocultarError();
  };

  window.iniciarSesion = async () => {
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-pass').value;
    const btn   = document.getElementById('btn-login-submit');
    if (!email || !pass) return mostrarError('Completa todos los campos.');
    btn.disabled = true; btn.textContent = 'Entrando...';
    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch(e) {
      mostrarError(traducirError(e.code));
      btn.disabled = false; btn.textContent = '✨ Entrar';
    }
  };

  window.registrarse = async () => {
    const nombre = document.getElementById('reg-nombre').value.trim();
    const email  = document.getElementById('reg-email').value.trim();
    const pass   = document.getElementById('reg-pass').value;
    const btn    = document.getElementById('btn-reg-submit');
    if (!nombre || !email || !pass) return mostrarError('Completa todos los campos.');
    if (pass.length < 6) return mostrarError('La contraseña debe tener al menos 6 caracteres.');
    btn.disabled = true; btn.textContent = 'Creando cuenta...';
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      // Guardar nombre en Firestore directamente
      await setDoc(doc(db,'usuarios',cred.user.uid),{
        nombre, email,
        racha:1,
        ultimoAcceso: fechaHoy(),
        diasAcceso:   [fechaHoy()],
        cuentosLeidos:[]
      });
    } catch(e) {
      mostrarError(traducirError(e.code));
      btn.disabled = false; btn.textContent = '🌟 Crear cuenta';
    }
  };

  document.getElementById('btn-logout').addEventListener('click', async () => {
    detenerVoz();
    await signOut(auth);
    mostrarPantalla('auth');
  });

  function mostrarError(msg) {
    const el = document.getElementById('auth-error');
    el.textContent = msg; el.style.display = 'block';
  }
  function ocultarError() {
    document.getElementById('auth-error').style.display = 'none';
  }
  function traducirError(code) {
    const errores = {
      'auth/user-not-found':       '❌ No existe una cuenta con ese correo.',
      'auth/wrong-password':       '❌ Contraseña incorrecta.',
      'auth/email-already-in-use': '❌ Ese correo ya está registrado.',
      'auth/invalid-email':        '❌ El correo no es válido.',
      'auth/weak-password':        '❌ La contraseña es muy débil.',
      'auth/invalid-credential':   '❌ Correo o contraseña incorrectos.',
      'auth/too-many-requests':    '❌ Demasiados intentos. Espera un momento.',
    };
    return errores[code] || '❌ Ocurrió un error. Intenta de nuevo.';
  }

  /* ══════════════════════════════════════
     VOZ: WEB SPEECH API
  ══════════════════════════════════════ */
  const btnPlay  = document.getElementById('btn-play');
  const btnPausa = document.getElementById('btn-pausa');
  const btnStop  = document.getElementById('btn-stop');
  const barraProgreso = document.getElementById('barra-progreso');

  function elegirVoz() {
    const voces = speechSynthesis.getVoices();
    const prioridad = [
      v => v.lang.startsWith('es') && /google/i.test(v.name),
      v => v.lang.startsWith('es') && /female|mujer|femenin/i.test(v.name),
      v => v.lang.startsWith('es'),
      v => v.default,
    ];
    for (const f of prioridad) { const v = voces.find(f); if(v) return v; }
    return voces[0]||null;
  }

  function actualizarBotones() {
    btnPlay.disabled  = leyendo && !pausado;
    btnPausa.disabled = !leyendo || pausado;
    btnStop.disabled  = !leyendo && !pausado;
  }

  function resaltarParrafo(idx) {
    document.querySelectorAll('.parrafo-activo').forEach(el=>el.classList.remove('parrafo-activo'));
    const p = document.getElementById(`parrafo-${idx}`);
    if(p){ p.classList.add('parrafo-activo'); p.scrollIntoView({behavior:'smooth',block:'center'}); }
    if(cuentoActivo) barraProgreso.style.width = `${((idx+1)/cuentoActivo.texto.length)*100}%`;
  }

  function leerParrafo(idx) {
    if(!cuentoActivo||idx>=cuentoActivo.texto.length){
      leyendo=false;pausado=false;actualizarBotones();
      barraProgreso.style.width='100%';
      document.querySelectorAll('.parrafo-activo').forEach(el=>el.classList.remove('parrafo-activo'));
      return;
    }
    resaltarParrafo(idx);
    utterance = new SpeechSynthesisUtterance(cuentoActivo.texto[idx]);
    utterance.voice = elegirVoz();
    utterance.rate  = 0.82;
    utterance.pitch = 1.1;
    utterance.lang  = 'es-ES';
    utterance.onend = () => { if(leyendo) leerParrafo(idx+1); };
    utterance.onerror = () => { leyendo=false;actualizarBotones(); };
    speechSynthesis.speak(utterance);
  }

  btnPlay.addEventListener('click', () => {
    if(!cuentoActivo) return;
    if(pausado){ speechSynthesis.resume();leyendo=true;pausado=false; }
    else{ speechSynthesis.cancel();leyendo=true;pausado=false;barraProgreso.style.width='0%';leerParrafo(0); }
    actualizarBotones();
  });
  btnPausa.addEventListener('click', () => {
    if(leyendo&&!pausado){ speechSynthesis.pause();pausado=true;leyendo=false;actualizarBotones(); }
  });
  btnStop.addEventListener('click', detenerVoz);

  function detenerVoz() {
    speechSynthesis.cancel();leyendo=false;pausado=false;
    barraProgreso.style.width='0%';
    document.querySelectorAll('.parrafo-activo').forEach(el=>el.classList.remove('parrafo-activo'));
    actualizarBotones();
  }
  if(speechSynthesis.onvoiceschanged!==undefined) speechSynthesis.onvoiceschanged=()=>{};

  /* ══════════════════════════════════════
     MODO NOCHE
  ══════════════════════════════════════ */
  let modoNoche = false;
  document.getElementById('btn-tema').addEventListener('click', () => {
    modoNoche = !modoNoche;
    document.documentElement.setAttribute('data-tema', modoNoche?'noche':'');
    document.getElementById('btn-tema').textContent = modoNoche?'☀️':'🌙';
  });

</script>
</body>
</html>
